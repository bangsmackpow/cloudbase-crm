name = "cloudbase-crm"
main = "src/index.ts"
compatibility_date = "2024-03-21"

[[d1_databases]]
binding = "DB"
database_name = "cloudbase-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "cloudbase-assets"

[ai]
binding = "AI"

[vars]
JWT_SECRET = "dev-secret-123"