name = "chalkboard-crm"
main = "src/index.ts"
compatibility_date = "2024-03-21"

[[d1_databases]]
binding = "DB"
database_name = "chalkboard-db"
database_id = "faf9a32b-1947-4cbb-a41f-6fe96d245fcc"

[ai]
binding = "AI"

[vars]
JWT_SECRET = "chalkboard-dev-secret"

# R2 Buckets will be added dynamically as tenants are onboarded
# or we use a single bucket with Org-level prefixing for scale.
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "chalkboard-assets"
